<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dish to Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #e8c97a;
    --accent-dim: rgba(232,201,122,0.12);
    --accent-border: rgba(232,201,122,0.3);
    --green: #6fcf97;
    --green-dim: rgba(111,207,151,0.12);
    --red: #eb5757;
    --bb: #e05f2c;
    --bl: #f8c414;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Background grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* LEFT PANEL */
  .main-panel {
    padding: 40px 44px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: 100vh;
  }

  header {
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 10px;
  }

  h1 span { color: var(--accent); }

  .tagline {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 130px 16px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--accent-border); }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .search-btn:hover { opacity: 0.88; }
  .search-btn:active { transform: translateY(-50%) scale(0.97); }

  /* Serving slider */
  .serving-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    margin-bottom: 16px;
  }

  .serving-bar label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .serving-bar input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border-hover);
    border-radius: 2px;
    outline: none;
  }

  .serving-bar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .serving-count {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    min-width: 64px;
    text-align: right;
  }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }

  .chip {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent-border); color: var(--accent); }

  /* Status */
  #status {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 20px;
    min-height: 16px;
  }

  /* Ingredients grid */
  .ing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }

  .ing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ing-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

  .ing-emoji {
    font-size: 26px;
    margin-bottom: 4px;
  }

  .ing-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .ing-qty {
    font-size: 12px;
    color: var(--text-muted);
  }

  .ing-price {
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    margin-top: 4px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .add-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-btn:hover:not(:disabled) { border-color: var(--accent-border); color: var(--accent); }
  .add-btn.added { background: var(--green-dim); border-color: rgba(111,207,151,0.3); color: var(--green); }
  .add-btn:disabled { opacity: 0.6; cursor: default; }

  .swap-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .swap-btn:hover:not(:disabled) { border-color: var(--border-hover); color: var(--text); }
  .swap-btn:disabled { opacity: 0.5; }

  .buy-links {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .buy-link {
    flex: 1;
    text-align: center;
    font-size: 11px;
    padding: 5px 0;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .buy-link:hover { opacity: 0.8; }
  .buy-link.bb { background: rgba(224,95,44,0.12); color: #e05f2c; border: 1px solid rgba(224,95,44,0.25); }
  .buy-link.bl { background: rgba(248,196,20,0.12); color: #d4a800; border: 1px solid rgba(248,196,20,0.25); }

  .swap-result {
    font-size: 11px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    line-height: 1.6;
    margin-top: 6px;
    border-left: 2px solid var(--accent-border);
  }

  /* RIGHT PANEL — Cart */
  .cart-panel {
    padding: 40px 28px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    max-height: 100vh;
    overflow-y: auto;
    position: sticky;
    top: 0;
  }

  .cart-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }

  .cart-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .cart-count {
    font-size: 12px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    padding: 2px 10px;
    font-weight: 500;
  }

  .cart-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
  }

  .cart-empty-icon {
    font-size: 38px;
    opacity: 0.3;
  }

  .cart-items { flex: 1; }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .cart-item-qty { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .cart-item-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .cart-item-price {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .remove-btn:hover { color: var(--red); }

  .cart-footer { margin-top: 20px; }

  .cart-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .cart-total-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .cart-total-amt {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
  }

  .checkout-btn {
    width: 100%;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: var(--radius);
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .checkout-btn:hover { opacity: 0.88; }
  .checkout-btn:active { transform: scale(0.98); }

  .clear-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--border-hover); color: var(--text); }

  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); height: 170px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* Mobile */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .main-panel { padding: 24px 20px; max-height: none; }
    .cart-panel { position: static; max-height: none; border-top: 1px solid var(--border); padding: 28px 20px; }
    h1 { font-size: 30px; }
    .ing-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- LEFT: Main -->
  <div class="main-panel">
    <header>
      <div class="logo">✦ Dish to Cart</div>
      <h1>Find. Cook. <span>Shop.</span></h1>
      <p class="tagline">Type any dish — get its ingredients, scale servings, and shop instantly.</p>
    </header>

    <div class="search-wrap">
      <input type="text" id="dish-input" placeholder="Try: Butter Chicken, Biryani, Pad Thai…" />
      <button class="search-btn" onclick="fetchIngredients()">Search</button>
    </div>

    <div class="serving-bar">
      <label>Servings</label>
      <input type="range" id="serving-slider" min="1" max="12" step="1" value="2" oninput="onServingChange()" />
      <span class="serving-count" id="serving-display">2 people</span>
    </div>

    <div class="chips">
      <button class="chip" onclick="quickSearch('Butter Chicken')">Butter Chicken</button>
      <button class="chip" onclick="quickSearch('Chicken Biryani')">Chicken Biryani</button>
      <button class="chip" onclick="quickSearch('Masala Dosa')">Masala Dosa</button>
      <button class="chip" onclick="quickSearch('Pasta Carbonara')">Pasta Carbonara</button>
      <button class="chip" onclick="quickSearch('Pad Thai')">Pad Thai</button>
      <button class="chip" onclick="quickSearch('Palak Paneer')">Palak Paneer</button>
    </div>

    <div id="status"></div>
    <div id="ingredients-area"></div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="cart-panel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <span class="cart-count" id="cart-count">0 items</span>
    </div>
    <div id="cart-area">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div>Search a dish and add<br/>ingredients to your cart.</div>
      </div>
    </div>
  </div>
</div>

<script>
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';

let cart = [];
let baseIngredients = [];
let baseServings = 2;
let currentServings = 2;
let swapCache = {};

const EMOJIS = {
  chicken:'🍗', tomato:'🍅', onion:'🧅', garlic:'🧄', ginger:'🫚', butter:'🧈',
  cream:'🥛', milk:'🥛', egg:'🥚', oil:'🫙', rice:'🍚', potato:'🥔',
  lemon:'🍋', salt:'🧂', pepper:'🫙', sugar:'🍬', flour:'🌾', spinach:'🥬',
  paneer:'🧀', cheese:'🧀', pasta:'🍝', noodle:'🍜', shrimp:'🍤',
  default: '🥄'
};

function getEmoji(name) {
  const lower = name.toLowerCase();
  for (const [key, val] of Object.entries(EMOJIS)) {
    if (lower.includes(key)) return val;
  }
  return EMOJIS.default;
}

function quickSearch(dish) {
  document.getElementById('dish-input').value = dish;
  fetchIngredients();
}

function onServingChange() {
  currentServings = parseInt(document.getElementById('serving-slider').value);
  document.getElementById('serving-display').textContent = currentServings + (currentServings === 1 ? ' person' : ' people');
  if (baseIngredients.length) renderIngredients();
}

function scaleQty(qty, ratio) {
  return qty.replace(/[\d.]+/g, n => {
    const s = parseFloat(n) * ratio;
    return s % 1 === 0 ? s : s.toFixed(1);
  });
}

async function fetchIngredients() {
  const dish = document.getElementById('dish-input').value.trim();
  if (!dish) return;
  baseServings = parseInt(document.getElementById('serving-slider').value);
  currentServings = baseServings;
  swapCache = {};

  const statusEl = document.getElementById('status');
  const areaEl = document.getElementById('ingredients-area');
  statusEl.textContent = 'Fetching ingredients…';
  areaEl.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `List ingredients to make "${dish}" for ${baseServings} servings. For each, give: name, quantity, and estimated price in Indian Rupees (INR). Respond ONLY with a JSON array, no markdown, no explanation. Format: [{"name":"...","quantity":"...","price":0}]. Include 6-10 ingredients.`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content.map(i => i.text || '').join('');
    baseIngredients = JSON.parse(text.replace(/```json|```/g, '').trim());
    renderIngredients();
    statusEl.textContent = baseIngredients.length + ' ingredients found for "' + dish + '"';
  } catch(e) {
    statusEl.textContent = 'Something went wrong. Please try again.';
    areaEl.innerHTML = '';
  }
}

function renderIngredients() {
  const ratio = currentServings / baseServings;
  const area = document.getElementById('ingredients-area');
  area.innerHTML = '<div class="ing-grid">' + baseIngredients.map((ing, i) => {
    const scaledQty = scaleQty(ing.quantity, ratio);
    const scaledPrice = Math.round(ing.price * ratio);
    const inCart = cart.some(c => c.name === ing.name);
    const bbUrl = 'https://www.bigbasket.com/ps/?q=' + encodeURIComponent(ing.name);
    const blUrl = 'https://blinkit.com/s/?q=' + encodeURIComponent(ing.name);
    const emoji = getEmoji(ing.name);
    const swapHtml = swapCache[i] ? `<div class="swap-result">${swapCache[i]}</div>` : '';
    const delay = (i * 0.05).toFixed(2);
    return `<div class="ing-card" style="animation-delay:${delay}s">
      <div class="ing-emoji">${emoji}</div>
      <div class="ing-name">${ing.name}</div>
      <div class="ing-qty">${scaledQty}</div>
      <div class="ing-price">₹${scaledPrice}</div>
      <div class="card-actions">
        <button class="add-btn ${inCart ? 'added' : ''}" id="btn-${i}" onclick="addToCart(${i},${scaledPrice},'${scaledQty.replace(/'/g,"\\'")}');" ${inCart ? 'disabled' : ''}>${inCart ? '✓ Added' : '+ Add to cart'}</button>
        <button class="swap-btn" id="swap-${i}" onclick="getSwap(${i})">⇄ Swap</button>
      </div>
      <div class="buy-links">
        <a class="buy-link bb" href="${bbUrl}" target="_blank">BigBasket</a>
        <a class="buy-link bl" href="${blUrl}" target="_blank">Blinkit</a>
      </div>
      ${swapHtml}
    </div>`;
  }).join('') + '</div>';
}

async function getSwap(idx) {
  if (swapCache[idx]) { delete swapCache[idx]; renderIngredients(); return; }
  const ing = baseIngredients[idx];
  const btn = document.getElementById('swap-' + idx);
  if (!btn) return;
  btn.textContent = '…'; btn.disabled = true;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        messages: [{
          role: 'user',
          content: `Give 2 quick ingredient substitutes for "${ing.name}" in cooking. Very brief. Format exactly: "Alt 1: [substitute] | Alt 2: [substitute]". Nothing else.`
        }]
      })
    });
    const data = await resp.json();
    swapCache[idx] = data.content.map(i => i.text || '').join('').trim();
  } catch(e) {
    swapCache[idx] = 'Could not fetch alternatives.';
  }
  renderIngredients();
}

function addToCart(idx, scaledPrice, scaledQty) {
  const ing = baseIngredients[idx];
  if (cart.some(c => c.name === ing.name)) return;
  cart.push({ name: ing.name, quantity: scaledQty, price: scaledPrice });
  renderIngredients();
  renderCart();
}

function removeFromCart(name) {
  cart = cart.filter(c => c.name !== name);
  renderIngredients();
  renderCart();
}

function clearCart() {
  cart = [];
  renderIngredients();
  renderCart();
}

function renderCart() {
  const area = document.getElementById('cart-area');
  const countEl = document.getElementById('cart-count');
  countEl.textContent = cart.length + (cart.length === 1 ? ' item' : ' items');

  if (!cart.length) {
    area.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>No items yet.<br/>Search a dish to start.</div></div>`;
    return;
  }

  const total = cart.reduce((s, c) => s + c.price, 0);
  area.innerHTML = `
    <div class="cart-items">
      ${cart.map(c => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${c.name}</div>
            <div class="cart-item-qty">${c.quantity}</div>
          </div>
          <div class="cart-item-right">
            <span class="cart-item-price">₹${c.price}</span>
            <button class="remove-btn" onclick="removeFromCart('${c.name.replace(/'/g,"\\'")}')">✕</button>
          </div>
        </div>`).join('')}
    </div>
    <div class="cart-footer">
      <hr class="cart-divider" />
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amt">₹${total}</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
      <button class="clear-btn" onclick="clearCart()">Clear cart</button>
    </div>`;
}

function checkout() {
  const total = cart.reduce((s, c) => s + c.price, 0);
  const items = cart.map(c => `${c.name} (${c.quantity})`).join(', ');
  alert('Cart Summary:\n\n' + items + '\n\nEstimated Total: ₹' + total + '\n\nOpen BigBasket or Blinkit tabs to order each item!');
}

document.getElementById('dish-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchIngredients();
});
</script>
</body>
</html>
